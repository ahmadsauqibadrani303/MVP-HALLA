<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hallaq</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

.logo {
    font-weight: bold;
    font-size: 22px;
    color: gold;
}

/* HERO */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.hero h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

.hero p {
    color: #aaa;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 40px;
}

/* CARD */
.card {
    background: #1c1c1c;
    border-radius: 16px;
    padding: 25px;
    transition: 0.3s;
    border: 1px solid #2a2a2a;
}

.card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 30px rgba(255,215,0,0.2);
}

/* TITLE */
.card h3 {
    margin-bottom: 10px;
}

/* LOCATION */
.location {
    color: #888;
    margin-bottom: 15px;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, gold, #d4af37);
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.btn:hover {
    opacity: 0.85;
}

/* BADGE */
.badge {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 8px;
    background: rgba(255,215,0,0.1);
    color: gold;
    font-size: 12px;
    margin-bottom: 10px;
}

/* MOBILE */
@media(max-width:600px){
    .hero h1 {
        font-size: 26px;
    }
}

</style>
</head>

<body>

<div class="navbar">
    <div class="logo">💈 Hallaq</div>
</div>

<div class="hero">
    <h1>Book Your Barber Instantly</h1>
    <p>No more waiting. Choose your barber & time in seconds.</p>
</div>

<div class="grid" id="shops"></div>

<script>
const API = "http://localhost:3000";

// FETCH DATA
fetch(API + "/barbershops")
.then(res => res.json())
.then(data => {

    let html = "";

    data.forEach(s => {
        html += `
        <div class="card">
            <div class="badge">Available</div>
            <h3>${s.name}</h3>
            <div class="location">📍 ${s.location}</div>
            <button class="btn" onclick="selectShop(${s.id})">
                Select Barbershop
            </button>
        </div>
        `;
    });

    document.getElementById("shops").innerHTML = html;
});

function selectShop(id){
    alert("Selected Shop ID: " + id);
    // nanti redirect ke halaman barber
}
</script>

</body>
</html>
